name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build linux/amd64
        env:
          CGO_ENABLED: '1'
        run: |
          go build -o treeloom-go ./cmd/treeloom-go
          tar czf treeloom-go_${GITHUB_REF_NAME}_linux_amd64.tar.gz treeloom-go
          sha256sum treeloom-go_${GITHUB_REF_NAME}_linux_amd64.tar.gz >> checksums_linux.txt

      - name: Upload linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            treeloom-go_*.tar.gz
            checksums_linux.txt

  release-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build darwin/${{ matrix.goarch }}
        env:
          CGO_ENABLED: '1'
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o treeloom-go ./cmd/treeloom-go
          tar czf treeloom-go_${GITHUB_REF_NAME}_darwin_${{ matrix.goarch }}.tar.gz treeloom-go
          shasum -a 256 treeloom-go_${GITHUB_REF_NAME}_darwin_${{ matrix.goarch }}.tar.gz >> checksums_darwin_${{ matrix.goarch }}.txt

      - name: Upload macOS artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            treeloom-go_*.tar.gz
            checksums_darwin_*.txt
